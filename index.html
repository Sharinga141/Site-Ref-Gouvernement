<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Titre  -->
  <title>Site ref gouv</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #12121f; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
    .card { background: #1a1c2e; border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 360px; text-align: center; }
    .logo-wrap { margin-bottom: 20px; }
    .logo-img { width: 90px; height: 90px; object-fit: contain; border-radius: 18px; }
    .title { font-size: 22px; font-weight: 700; color: #ffffff; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #8888aa; margin-bottom: 28px; line-height: 1.6; }
    .discord-btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 14px 20px; background: #5865F2; border: none; border-radius: 12px; color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .discord-btn:hover { background: #4752C4; }
    .discord-btn:active { transform: scale(0.98); }
    .divider { border: none; border-top: 0.5px solid #2e2e4a; margin: 24px 0; }
    .legal { font-size: 12px; color: #55557a; line-height: 1.7; }
    .error-msg { font-size: 12px; color: #E24B4A; margin-top: 12px; min-height: 16px; }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-wrap">
      <img class="logo-img" src="https://raw.githubusercontent.com/Sharinga141/staff-panel/main/DOJ.png" alt="DOJ Logo">
    </div>
    <div class="title">Référencement Gouvernement</div>
    <div class="subtitle">Connectez-vous pour accéder au site </div>


  </script>
</body>
</html>
